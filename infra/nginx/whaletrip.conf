# HTTP → HTTPS redirect
server {
  listen 80;
  server_name whaletrip.datadinosaur.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS — frontend static files served from nginx, API proxied
server {
  listen 443 ssl http2;
  server_name whaletrip.datadinosaur.com;

  ssl_certificate     /etc/letsencrypt/live/whaletrip.datadinosaur.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/whaletrip.datadinosaur.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;

  # API proxy — /api/* → FastAPI on port 8000
  location /api/ {
    limit_req zone=api_zone burst=20 nodelay;
    proxy_pass         http://api:8000/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_buffering    off;
  }

  # Chat rate limiting
  location /api/chat {
    limit_req zone=chat_zone burst=5 nodelay;
    proxy_pass http://api:8000/chat;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
  }

  # Frontend static files (Next.js export)
  root /var/www/whaletrip;
  index index.html;

  location / {
    try_files $uri $uri.html $uri/ /index.html;
    expires 1h;
    add_header Cache-Control "public, no-transform";
  }

  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}

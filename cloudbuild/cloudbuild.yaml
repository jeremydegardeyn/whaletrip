steps:
  # ── Build API image ──────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-api
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/api:${_TAG}'
      - -t
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/api:latest'
      - ./services/api
    waitFor: ['-']

  # ── Build Agents image ───────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-agents
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/agents:${_TAG}'
      - -t
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/agents:latest'
      - ./services/agents
    waitFor: ['-']

  # ── Push images ──────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-api
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/api']
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-agents
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/agents']
    waitFor: ['build-agents']

  # ── Deploy Agents to Cloud Run ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy-agents
    args:
      - run
      - deploy
      - whaletrip-agents
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/agents:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --no-traffic
      - --tag=candidate
    waitFor: ['push-agents']

  # ── Deploy API to Cloud Run ──────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy-api
    args:
      - run
      - deploy
      - whaletrip-api
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/api:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --no-traffic
      - --tag=candidate
    waitFor: ['push-api']

  # ── Migrate 100% traffic to new revisions ───────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: promote-agents
    args:
      - run
      - services
      - update-traffic
      - whaletrip-agents
      - --region=${_REGION}
      - --to-tags=candidate=100
    waitFor: ['deploy-agents']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: promote-api
    args:
      - run
      - services
      - update-traffic
      - whaletrip-api
      - --region=${_REGION}
      - --to-tags=candidate=100
    waitFor: ['deploy-api']


substitutions:
  _PROJECT_ID: ''
  _REGION: 'us-central1'
  _TAG: 'latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/api:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/whaletrip/agents:${_TAG}'
